services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nippo_db
      POSTGRES_USER: nippo
      POSTGRES_PASSWORD: nippo_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nippo -d nippo_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: development
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://nippo:nippo_password@db:5432/nippo_db
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      PORT: 3000
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      target: development
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000/v1
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
